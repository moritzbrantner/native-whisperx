name: package dry-run

# Manual release gate only. Callers select the stage that matches registry
# publication state; this workflow never publishes crates.
on:
  workflow_dispatch:
    inputs:
      stage:
        description: Release stage to verify
        required: true
        type: choice
        options:
          - library-prepublish
          - cli-post-library-publish

permissions:
  contents: read

jobs:
  library-prepublish:
    name: library prepublication package gate
    if: inputs.stage == 'library-prepublish'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check release metadata
        run: python3 scripts/check-release-metadata.py

      - name: Package native-whisperx
        run: cargo package -p native-whisperx --locked

      - name: Inspect native-whisperx-cli package contents
        run: cargo package -p native-whisperx-cli --locked --list

  cli-post-library-publish:
    name: CLI post-library-publication package gate
    if: inputs.stage == 'cli-post-library-publish'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify native-whisperx 0.1.14 is published
        run: cargo info native-whisperx@0.1.14 --registry crates-io

      - name: Package native-whisperx-cli
        run: cargo package -p native-whisperx-cli --locked

      - name: Install native-whisperx-cli smoke
        run: cargo test -p native-whisperx-cli --test release_install_smoke -- --ignored --exact cargo_install_package_exposes_native_whisperx_command
