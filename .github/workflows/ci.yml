name: ci

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test workspace
        run: cargo test --workspace

  test-no-default-features:
    name: cargo test --no-default-features
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test workspace without default features
        run: cargo test --workspace --no-default-features

  frontend:
    name: speaker directory frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/native-whisperx-cli/speaker-directory-ui
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bun run check

      - name: Verify checked-in production assets are current
        run: git diff --exit-code -- dist

  feature-matrix:
    name: cargo test feature matrix (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: native
            cargo-args: --no-default-features --features native
          - name: translation
            cargo-args: --no-default-features --features translation
          - name: media-decode
            cargo-args: --no-default-features --features media-decode
          - name: diarization
            cargo-args: --no-default-features --features diarization
          - name: onnx-diarization
            cargo-args: --no-default-features --features onnx-diarization
          - name: pyannote-diarization
            cargo-args: --no-default-features --features pyannote-diarization
          - name: silero-vad
            cargo-args: --no-default-features --features silero-vad
          - name: pyannote-vad
            cargo-args: --no-default-features --features pyannote-vad
          - name: whisperx-compat
            cargo-args: --no-default-features --features whisperx-compat
          - name: default-plus-silero
            cargo-args: --features silero-vad
          - name: combined-offline-optional
            cargo-args: --no-default-features --features native,translation,media-decode,diarization,onnx-diarization,pyannote-diarization,silero-vad,pyannote-vad,whisperx-compat
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test optional feature set
        run: cargo test --workspace ${{ matrix.cargo-args }}
