name: ci

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test workspace
        run: cargo test --workspace

  test-no-default-features:
    name: cargo test --no-default-features
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test workspace without default features
        run: cargo test --workspace --no-default-features

  frontend:
    name: speaker directory frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/native-whisperx-cli/speaker-directory-ui
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bun run check

      - name: Verify checked-in production assets are current
        run: git diff --exit-code -- dist

  feature-matrix:
    name: cargo check feature matrix (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: compat-media-diarization
            features: whisperx-compat,media-decode,diarization
          - name: silero-vad
            features: silero-vad
          - name: onnx-diarization
            features: onnx-diarization
          - name: translation
            features: translation
          - name: combined-offline-optional
            features: whisperx-compat,translation,media-decode,silero-vad,diarization,onnx-diarization
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check optional feature set
        run: cargo check --workspace --no-default-features --features "${{ matrix.features }}"
